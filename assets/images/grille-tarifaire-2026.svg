<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600">
  <rect width="1200" height="1600" fill="#f5f7fb"/>
  <text x="600" y="90" text-anchor="middle" fill="#0d3f77" font-family="Arial" font-size="52" font-weight="700">GRILLE TARIFAIRE</text>
  <text x="600" y="130" text-anchor="middle" fill="#1b2a3a" font-family="Arial" font-size="28">Version 1 du 12/02/2026 - Tarifs TTC</text>
  <rect x="90" y="190" width="1020" height="320" fill="#e7edf5"/>
  <g fill="#0d3f77" font-family="Arial" font-size="34" font-weight="700">
    <text x="120" y="270">Pack 1 diagnostic (DPE)</text><text x="120" y="335">120 €</text>
    <text x="460" y="270">Pack 2 diagnostics</text><text x="460" y="335">230 €</text>
    <text x="790" y="270">Pack 3 diagnostics</text><text x="790" y="335">300 €</text>
    <text x="120" y="430">Pack 4 diagnostics</text><text x="120" y="495">360 €</text>
    <text x="460" y="430">Pack 5 diagnostics</text><text x="460" y="495">420 €</text>
    <text x="790" y="430">Pack 6 diagnostics</text><text x="790" y="495">470 €</text>
  </g>
  <text x="90" y="585" fill="#0d3f77" font-family="Arial" font-size="48" font-weight="700">Tarifs unitaires</text>
  <rect x="90" y="620" width="1020" height="70" fill="#0d3f77"/>
  <text x="110" y="668" fill="white" font-family="Arial" font-size="32" font-weight="700">Prestation</text>
  <text x="850" y="668" fill="white" font-family="Arial" font-size="32" font-weight="700">Tarif</text>
  <g fill="#1b2a3a" font-family="Arial" font-size="30">
    <rect x="90" y="690" width="1020" height="540" fill="none" stroke="#aebad0" stroke-width="3"/>
    <line x1="670" x2="670" y1="690" y2="1230" stroke="#aebad0" stroke-width="3"/>
    <line x1="90" x2="1110" y1="750" y2="750" stroke="#aebad0"/><line x1="90" x2="1110" y1="810" y2="810" stroke="#aebad0"/><line x1="90" x2="1110" y1="870" y2="870" stroke="#aebad0"/><line x1="90" x2="1110" y1="930" y2="930" stroke="#aebad0"/><line x1="90" x2="1110" y1="990" y2="990" stroke="#aebad0"/><line x1="90" x2="1110" y1="1050" y2="1050" stroke="#aebad0"/><line x1="90" x2="1110" y1="1110" y2="1110" stroke="#aebad0"/><line x1="90" x2="1110" y1="1170" y2="1170" stroke="#aebad0"/>
    <text x="105" y="735">Repérage amiante</text><text x="850" y="735" fill="#0d3f77" font-weight="700">120 €</text>
    <text x="105" y="795">CREP (Plomb)</text><text x="850" y="795" fill="#0d3f77" font-weight="700">120 €</text>
    <text x="105" y="855">Gaz</text><text x="850" y="855" fill="#0d3f77" font-weight="700">120 €</text>
    <text x="105" y="915">Électricité</text><text x="850" y="915" fill="#0d3f77" font-weight="700">120 €</text>
    <text x="105" y="975">Mesurage surface habitable</text><text x="850" y="975" fill="#0d3f77" font-weight="700">50 €</text>
    <text x="105" y="1035">État parasitaire</text><text x="850" y="1035" fill="#0d3f77" font-weight="700">60 €</text>
    <text x="105" y="1095">Forfait prélèvement</text><text x="850" y="1095" fill="#0d3f77" font-weight="700">30 €*</text>
    <text x="105" y="1155">ERP (état des risques et pollution)</text><text x="850" y="1155" fill="#0d3f77" font-weight="700">25 €</text>
    <text x="105" y="1215">À partir de 200 m²</text><text x="850" y="1215" fill="#0d3f77" font-weight="700">Sur devis**</text>
  </g>
  <text x="90" y="1310" fill="#1b2a3a" font-family="Arial" font-size="24">* Des prélèvements peuvent aussi être effectués dans le cadre du diagnostic amiante et plomb : 30 € TTC.</text>
  <text x="90" y="1348" fill="#1b2a3a" font-family="Arial" font-size="24">** Les biens dont la surface excède 200 m² doivent faire l'objet d'un devis personnalisé.</text>
